name: Apply Radinx Organiser Stability Updates

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download source archive
        run: |
          curl -fsSL "https://tmpfiles.org/dl/w2wr6dMQqooo/radinx-organiser-stability.zip" -o /tmp/radinx-organiser-stability.tar.gz
          echo "502089dd92bbf4ab0c98610379666efe00aa72ff1a95a9129de7dd1eb3d4c9d9  /tmp/radinx-organiser-stability.tar.gz" | sha256sum -c -

      - name: Apply source tree
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          tar -xzf /tmp/radinx-organiser-stability.tar.gz
          rm -f .github/workflows/bootstrap-source.yml

      - name: Commit source update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No source changes to commit."
            exit 0
          fi
          git commit -m "Stabilize navigation and Firebase UX"
          git push
