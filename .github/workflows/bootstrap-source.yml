name: Bootstrap Radinx Organiser

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  SOURCE_URL: https://tmpfiles.org/dl/wEw9gQ7lt7D4/radinx-organiser-source-clean.zip
  SOURCE_SHA256: e36aa7be176ac5b9fd19ac79766a8819f5480647cd7b1404a899e4fb1f00e07b
  GITHUB_PAGES: "true"
  VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
  VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
  VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
  VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
  VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
  VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
  VITE_GOOGLE_CALENDAR_CLIENT_ID: ${{ vars.VITE_GOOGLE_CALENDAR_CLIENT_ID }}

jobs:
  bootstrap-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout bootstrap repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download source archive
        run: |
          curl -fsSL "$SOURCE_URL" -o source.tar.gz
          echo "$SOURCE_SHA256  source.tar.gz" | sha256sum -c -

      - name: Extract clean source
        run: |
          tar -xzf source.tar.gz
          rm -f source.tar.gz
          find . -name '._*' -delete
          rm -f .github/workflows/bootstrap-source.yml

      - name: Commit source to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No source changes to commit."
          else
            git commit -m "Initial Radinx Organiser app"
            git push
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.2.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Prepare SPA fallback
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
