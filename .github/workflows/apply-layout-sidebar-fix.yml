name: Apply Layout Sidebar Fix

on:
  push:
    paths:
      - .github/workflows/apply-layout-sidebar-fix.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download prepared source
        run: |
          curl -L "https://tmpfiles.org/dl/wyw46JIIe6Xs/radinx-layout-sidebar-fix.zip" -o /tmp/radinx-layout-sidebar-fix.zip
          echo "7b9270fd67c20a63af193d7c721240f411ee9282b0f21522e8b52d691ff630cf  /tmp/radinx-layout-sidebar-fix.zip" | sha256sum -c -

      - name: Apply source snapshot
        run: |
          rm -rf /tmp/radinx-layout-sidebar-fix
          mkdir -p /tmp/radinx-layout-sidebar-fix
          unzip -q /tmp/radinx-layout-sidebar-fix.zip -d /tmp/radinx-layout-sidebar-fix
          rsync -a --delete \
            --exclude '.git' \
            --exclude '.github/workflows' \
            /tmp/radinx-layout-sidebar-fix/ ./
          rm -f .github/workflows/apply-layout-sidebar-fix.yml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Fix desktop layout and sidebar profile label"
          git push