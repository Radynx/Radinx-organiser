name: Apply Radinx Organiser Free Mode Updates

on:
  push:
    paths:
      - .github/workflows/apply-free-mode.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download prepared source
        run: |
          curl -L "https://tmpfiles.org/dl/wJwo6vU8FlT3/radinx-organiser-free-mode.zip" -o /tmp/radinx-organiser-free-mode.zip
          echo "e9a4479bf673e3299ba82208f63207acc6447529f128d70b4cd72590a0d78aef  /tmp/radinx-organiser-free-mode.zip" | sha256sum -c -

      - name: Apply source snapshot
        run: |
          rm -rf /tmp/radinx-organiser-free-mode
          mkdir -p /tmp/radinx-organiser-free-mode
          unzip -q /tmp/radinx-organiser-free-mode.zip -d /tmp/radinx-organiser-free-mode
          rsync -a --delete \
            --exclude '.git' \
            --exclude '.github/workflows/deploy-pages.yml' \
            --exclude '.github/workflows/apply-free-mode.yml' \
            /tmp/radinx-organiser-free-mode/ ./
          rm -f .github/workflows/apply-free-mode.yml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Remove Firebase Storage dependency"
          git push